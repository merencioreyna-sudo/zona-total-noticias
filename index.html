<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Zona Total Noticias</title>

  <meta name="description" content="Últimas noticias de actualidad en Zona Total Noticias.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/main.css">
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <h1 class="site-title">Zona Total Noticias</h1>

    <!-- BOTÓN HAMBURGUESA (MÓVIL) -->
    <button class="menu-toggle" type="button" aria-label="Abrir menú" aria-expanded="false">☰</button>

    <nav class="main-nav">
  <a href="https://merencioreyna-sudo.github.io/zona-total-peliculas/">
    <span class="icon">🏠</span> Inicio
  </a>

  <a href="index.html"><span class="icon">📰</span> Portada</a>
      <a href="index.html?cat=nacional"><span class="icon">📌</span> Nacional</a>
      <a href="index.html?cat=internacional"><span class="icon">🌍</span> Internacional</a>
      <a href="index.html?cat=economia"><span class="icon">💰</span> Economía</a>
      <a href="index.html?cat=tecnologia"><span class="icon">💻</span> Tecnología</a>
      <a href="index.html?cat=cultura"><span class="icon">🎭</span> Cultura</a>
      <a href="index.html?cat=deportes"><span class="icon">🏆</span> Deportes</a>
      <a href="index.html?cat=farandula"><span class="icon">🎤</span> Farándula</a>
    </nav>
  </div>
</header>

<main class="content">
  <section id="portada">
    <div id="noticia-principal"></div>

    <div id="noticias-secundarias">
      <div class="loader-box">
        <p class="loading-msg">Cargando noticias...</p>
        <div class="spinner"></div>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  © 2026 Zona Total Noticias
</footer>

<script src="js/news.js"></script>

<!-- JS MENÚ HAMBURGUESA (AISLADO, NO TOCA NADA MÁS) -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const btn = document.querySelector('.menu-toggle');
    const nav = document.querySelector('.main-nav');
    if (!btn || !nav) return;

    btn.addEventListener('click', function () {
  nav.classList.toggle('open');

  // 👇 fuerza que empiece desde arriba siempre
  if (nav.classList.contains('open')) {
    nav.scrollTop = 0;
  }
      btn.setAttribute(
        'aria-expanded',
        nav.classList.contains('open') ? 'true' : 'false'
      );
    });

    nav.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', function () {
        nav.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      });
    });
  });
</script>


</body>
</html>
